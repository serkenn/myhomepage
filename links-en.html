<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mutual Links - Kentaro Yamamoto</title>
    <link rel="icon" id="favicon" href="assets/image.webp" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <noscript>
      <style>
        .noscript-lang-links {
          display: flex;
        }
      </style>
    </noscript>

    <style>
      :root {
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --accent-color: #00ffff;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "M PLUS Rounded 1c", sans-serif;
        color: var(--text-main);
        background-color: #0f172a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow-y: auto;
        padding: 2rem 0;
      }

      .container {
        width: 100%;
        max-width: 600px;
        padding: 2rem;
        text-align: center;
        z-index: 10;
        animation: fadeIn 1.2s cubic-bezier(0.22, 1, 0.36, 1);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      h1 {
        font-size: 1.8rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        margin-bottom: 2rem;
      }

      .links-grid {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .links-grid a {
        display: block;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 1rem;
        font-weight: 700;
        padding: 1rem 1.5rem;
        border-radius: 16px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition: all 0.3s ease;
        overflow: hidden;
      }

      .links-grid a:hover {
        color: var(--accent-color);
        border-color: rgba(0, 255, 255, 0.3);
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
      }

      .links-grid a img.banner {
        display: block;
        width: 100%;
        max-height: 120px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 0.8rem;
      }

      .my-banner {
        margin-top: 2.5rem;
        text-align: center;
      }

      .my-banner p {
        color: var(--text-muted);
        font-size: 0.9rem;
        font-weight: 700;
        margin-bottom: 0.8rem;
      }

      .my-banner img {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 0 auto 0.8rem;
        border-radius: 12px;
        border: 1px solid var(--glass-border);
      }

      .my-banner code {
        display: inline-block;
        font-size: 0.75rem;
        color: var(--accent-color);
        background: rgba(0, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        padding: 0.4rem 0.8rem;
        user-select: all;
      }

      .back-link {
        display: inline-block;
        margin-top: 2rem;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.85rem;
        padding: 0.5rem 1rem;
        border-radius: 12px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition: all 0.3s ease;
      }

      .back-link:hover {
        color: var(--accent-color);
        border-color: rgba(0, 255, 255, 0.3);
      }

      .noscript-lang-links {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 100;
        display: none;
        gap: 0.5rem;
      }

      .noscript-lang-links a {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        color: var(--accent-color);
        padding: 0.5rem 1rem;
        border-radius: 12px;
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body id="vanta-bg">
  <noscript>
    <div class="noscript-lang-links" style="display:flex">
      <a href="links.html">JA</a>
      <a href="links-en.html">EN</a>
    </div>
  </noscript>

    <div class="container">

        <a
          href="https://shiumano-development.f5.si:8443/"

          <img

      <div class="my-banner">
        <p data-i18n="myBanner">Our Banner</p>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanta/0.5.24/vanta.net.min.js"></script>

    <script>
      // i18n
      var i18n = {
        ja: {
          mutual: "相互リンク",
          back: "\u2190 トップページに戻る",
          myBanner: "当サイトのバナー",
        },
        en: {
          mutual: "Mutual Links",
          back: "\u2190 Back to Top",
          myBanner: "Our Banner",
        },
      };

      var currentLang = "en";

      function detectLang() {
        var browserLang = (
          navigator.language ||
          navigator.userLanguage ||
          "ja"
        ).toLowerCase();
        if (!browserLang.startsWith("ja")) {
          currentLang = "en";
        }
        applyLang();
      }

      function applyLang() {
        var t = i18n[currentLang];
        document.documentElement.lang = currentLang;
        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var key = el.getAttribute("data-i18n");
          if (t[key] !== undefined) {
            el.textContent = t[key];
          }
        });
      }

      detectLang();

      // 丸型ファビコン生成
      (function () {
        var img = new Image();
        img.onload = function () {
          var size = 64;
          var canvas = document.createElement("canvas");
          canvas.width = size;
          canvas.height = size;
          var ctx = canvas.getContext("2d");
          ctx.beginPath();
          ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, 0, 0, size, size);
          document.getElementById("favicon").href =
            canvas.toDataURL("image/png");
        };
        img.src = "assets/image.webp";
      })();

      // 背景エフェクト (Vanta.js)
      VANTA.NET({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.0,
        minWidth: 200.0,
        scale: 1.0,
        scaleMobile: 1.0,
        color: 0x00ffff,
        backgroundColor: 0x0f172a,
        points: 12.0,
        maxDistance: 22.0,
        spacing: 18.0,
      });
    </script>
  </body>
</html>
